<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lead Tracker - CashFlix ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#111111; min-height:100vh; display:flex; justify-content:center; align-items:flex-start; padding:24px 0 40px; }
.wrap { width:100%; max-width:420px; margin:0 16px; }
.main-box { background:#fbf6ea; border-radius:28px; overflow:hidden; box-shadow:0 24px 64px rgba(0,0,0,.6); }
.logo-wrap { display:flex; justify-content:center; padding-top:40px; padding-bottom:14px; }
.logo-outer { width:80px; height:80px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 16px rgba(0,0,0,.13); }
.logo-inner { width:58px; height:58px; border-radius:14px; background:linear-gradient(135deg,#1c1c1c,#3a3a3a); display:flex; align-items:center; justify-content:center; }
.title-wrap { text-align:center; padding:0 24px 24px; }
.title { font-family:'Poppins',sans-serif; font-weight:800; font-size:29px; color:#1a1a1a; letter-spacing:-0.3px; }
.subtitle { font-weight:400; font-size:16px; color:#9a9184; margin-top:6px; }
.form-wrap { padding:0 20px 32px; display:flex; flex-direction:column; gap:14px; }
.pill { background:#fff; border-radius:50px; padding:0 16px; display:flex; align-items:center; gap:12px; height:56px; box-shadow:0 2px 12px rgba(0,0,0,.08); border:2px solid transparent; transition:border .2s; }
.pill.focused { border-color:#1c1c1c; }
.pill input { flex:1; border:none; outline:none; font-size:15px; font-weight:500; color:#374151; background:transparent; font-family:'Inter',sans-serif; }
.date-pill { background:#fff; border-radius:50px; padding:0 16px; display:flex; align-items:center; gap:8px; height:56px; box-shadow:0 2px 12px rgba(0,0,0,.08); border:2px solid #1c1c1c; }
.date-pill input[type="date"] { flex:1; border:none; outline:none; font-size:13px; font-weight:700; color:#1e293b; background:transparent; font-family:'Inter',sans-serif; min-width:0; cursor:pointer; }
.date-sep { color:#9a9184; font-weight:600; font-size:13px; flex-shrink:0; }
.select-box { height:50px; border-radius:50px; border:none; background:#fff; font-size:14px; font-weight:600; color:#1e293b; outline:none; box-shadow:0 2px 10px rgba(0,0,0,.08); font-family:'Inter',sans-serif; cursor:pointer; padding-left:18px; width:100%; }
.track-btn { height:54px; border-radius:50px; background:linear-gradient(180deg,#2b2b2b,#1c1c1c); color:#fdf6e3; font-weight:700; font-size:16px; border:none; cursor:pointer; letter-spacing:.5px; box-shadow:0 4px 24px rgba(0,0,0,.4); font-family:'Poppins',sans-serif; display:flex; align-items:center; justify-content:center; gap:12px; transition:all .2s; }
.track-btn:disabled { opacity:.7; cursor:not-allowed; }
.search-pill { background:#fff; border-radius:50px; padding:0 16px; display:flex; align-items:center; gap:12px; height:56px; box-shadow:0 2px 12px rgba(0,0,0,.08); border:2px solid transparent; transition:border .2s; margin-bottom:14px; }
.search-pill.focused { border-color:#1c1c1c; }
.search-pill input { flex:1; border:none; outline:none; font-size:14px; font-weight:500; color:#374151; background:transparent; font-family:'Inter',sans-serif; }
.result-card { background:#fbf6ea; border-radius:20px; overflow:hidden; margin-bottom:14px; box-shadow:0 8px 32px rgba(0,0,0,.3); }
.result-row { display:flex; justify-content:space-between; align-items:center; padding:15px 22px; border-bottom:1px solid #ece3cc; }
.result-row:last-child { border-bottom:none; }
.row-label { font-weight:800; font-size:14px; color:#1a1a1a; }
.row-val { font-weight:600; font-size:14px; color:#374151; }
.badge { color:#fff; padding:5px 16px; border-radius:8px; font-weight:700; font-size:13px; }
.no-result { background:#fbf6ea; border-radius:20px; padding:36px 24px; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,.3); }
.no-result-title { font-family:'Poppins',sans-serif; font-weight:700; font-size:16px; color:#374151; margin-bottom:8px; display:flex; align-items:center; justify-content:center; gap:8px; }
.no-result-sub { color:#9a9184; font-size:13px; }
.back-btn { width:100%; height:54px; border-radius:50px; background:linear-gradient(180deg,#2b2b2b,#1c1c1c); color:#fdf6e3; font-weight:700; font-size:15px; border:none; cursor:pointer; letter-spacing:.5px; box-shadow:0 4px 24px rgba(0,0,0,.4); font-family:'Poppins',sans-serif; display:flex; align-items:center; justify-content:center; gap:12px; }
.toast { position:fixed; top:24px; left:50%; transform:translateX(-50%) translateY(-16px); background:#fffdf7; color:#1a1a1a; padding:12px 22px 12px 12px; border-radius:50px; font-size:14px; font-weight:700; z-index:10000; opacity:0; visibility:hidden; transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1); box-shadow:0 12px 30px -6px rgba(0,0,0,0.25); font-family:'Inter',sans-serif; display:flex; align-items:center; gap:10px; white-space:nowrap; border:1px solid #ece3cc; max-width:calc(100vw - 32px); }
.toast.show { opacity:1; visibility:visible; transform:translateX(-50%) translateY(0); }
.toast-icon { width:24px; height:24px; border-radius:50%; background:#1c1c1c; color:#fdf6e3; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:900; flex-shrink:0; }
.toast-icon.error { background:#c62828; }
.spinner { width:18px; height:18px; border:3px solid rgba(253,246,227,.35); border-top:3px solid #fdf6e3; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
@keyframes spin { to{transform:rotate(360deg)} }
.pill i, .date-pill i, .search-pill i { font-size:17px; width:20px; text-align:center; flex-shrink:0; color:#1c1c1c; }
.track-btn i, .back-btn i { font-size:15px; }
.pill input, .search-pill input { font-size:16px; }
.date-pill input[type="date"] { font-size:14px; }
@media (max-width:380px) {
  .wrap { margin:0 10px; }
  .date-pill { flex-wrap:wrap; height:auto; padding:10px 14px; gap:6px; }
  .date-pill input[type="date"] { flex:1 1 40%; min-width:110px; }
  .row-label, .row-val { font-size:13px; }
  .result-row { padding:13px 16px; }
  .title { font-size:25px; }
}
</style>
</head>
<body>
<div class="wrap">

  <div class="main-box" id="mainBox">
    <div class="logo-wrap">
      <div class="logo-outer">
        <div class="logo-inner">
          <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
            <circle cx="14" cy="12" r="5" stroke="#f0dfae" stroke-width="2.5"/>
            <circle cx="24" cy="26" r="5" stroke="#fdf6e3" stroke-width="2.5"/>
            <line x1="14" y1="17" x2="24" y2="21" stroke="#f0dfae" stroke-width="2" stroke-dasharray="2 2"/>
            <circle cx="14" cy="12" r="2" fill="#f0dfae"/>
            <circle cx="24" cy="26" r="2" fill="#fdf6e3"/>
          </svg>
        </div>
      </div>
    </div>
    <div class="title-wrap">
      <div class="title">Lead Tracker</div>
      <div class="subtitle" id="offerSubtitle"></div>
    </div>
    <div class="form-wrap">
      <select class="select-box" id="offerSelect" onchange="updateSubtitle()">
        <option value="Nielsen">Nielsen</option>
        <option value="PolicyBazar">PolicyBazar</option>
      </select>
      <div class="pill" id="upiPill">
        <i class="fa-solid fa-landmark"></i>
        <input type="text" id="upiInput" placeholder="Enter UPI ID"
          onfocus="document.getElementById('upiPill').classList.add('focused')"
          onblur="document.getElementById('upiPill').classList.remove('focused')"
          onkeypress="if(event.key==='Enter') trackNow()"/>
      </div>
      <div class="date-pill">
        <i class="fa-solid fa-calendar"></i>
        <input type="date" id="fromDate"/>
        <span class="date-sep">to</span>
        <input type="date" id="toDate" style="text-align:right;"/>
      </div>
      <button class="track-btn" id="trackBtn" onclick="trackNow()">
        <span>Track Now</span>
        <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>
  </div>

  <div id="resultsWrap" style="display:none; margin-top:18px;">
    <div class="search-pill" id="searchPill">
      <i class="fa-solid fa-search" style="color:#9a9184;"></i>
      <input type="text" id="searchInput" placeholder="Search..."
        onfocus="document.getElementById('searchPill').classList.add('focused')"
        onblur="document.getElementById('searchPill').classList.remove('focused')"
        oninput="filterResults()"/>
    </div>
    <div id="resultsList"></div>
    <button class="back-btn" onclick="resetForm()">
      <i class="fa-solid fa-arrow-left"></i>
      Search Again
    </button>
  </div>

</div>

<div class="toast" id="toast">
  <span class="toast-icon" id="toastIcon">✓</span>
  <span id="toastText"></span>
</div>

<script>
const SERVER = 'https://cashflix-upi-8mzd.onrender.com';
let allResults = [];

// ✅ Today IST mein
const todayIST = new Date().toLocaleDateString('en-CA', {timeZone: 'Asia/Kolkata'});
document.getElementById('fromDate').value = todayIST;
document.getElementById('toDate').value = todayIST;

window.addEventListener('load', function() {
  const parts = window.location.pathname.split('/');
  const upiFromUrl = decodeURIComponent(parts[parts.length - 1]);
  if (upiFromUrl && upiFromUrl.includes('@')) {
    document.getElementById('upiInput').value = upiFromUrl;
    trackNow();
  }
});

function updateSubtitle() {
  document.getElementById('offerSubtitle').innerText = document.getElementById('offerSelect').value;
}

let toastTimer = null;
function showToast(msg, ok=true) {
  const t = document.getElementById('toast');
  const icon = document.getElementById('toastIcon');
  document.getElementById('toastText').innerText = msg;
  icon.innerText = ok ? '✓' : '✕';
  icon.classList.toggle('error', !ok);
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

async function trackNow() {
  const upi = document.getElementById('upiInput').value.trim();
  const offer = document.getElementById('offerSelect').value;
  const fromDate = document.getElementById('fromDate').value;
  const toDate = document.getElementById('toDate').value;
  const btn = document.getElementById('trackBtn');

  if (!upi || !upi.includes('@')) return showToast('Enter valid UPI ID', false);

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div><span>Tracking...</span>';

  try {
    const res = await fetch(`${SERVER}/tracker?upi=${encodeURIComponent(upi)}`);
    const data = await res.json();

    // ✅ IST date range — UTC offset 5:30 handle karo
    const from = new Date(fromDate + 'T00:00:00+05:30');
    const to = new Date(toDate + 'T23:59:59+05:30');

    if (!data.success) {
      allResults = [];
    } else {
      allResults = data.conversions.filter(c => {
        const cDate = new Date(c.time);
        return c.offer_name === offer && cDate >= from && cDate <= to;
      });
    }

    renderResults(allResults);
    document.getElementById('resultsWrap').style.display = 'block';

  } catch {
    showToast('Error! Try again.', false);
  }

  btn.disabled = false;
  btn.innerHTML = '<span>Track Now</span><i class="fa-solid fa-arrow-right"></i>';
}

function filterResults() {
  const s = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allResults.filter(r =>
    !s || (r.status||'').toLowerCase().includes(s) || (r.event||'').toLowerCase().includes(s)
  );
  renderResults(filtered);
}

function renderResults(results) {
  const list = document.getElementById('resultsList');

  if (results.length === 0) {
    list.innerHTML = `
      <div class="no-result">
        <div class="no-result-title"><i class="fa-solid fa-inbox"></i> No Records Found</div>
        <div class="no-result-sub">Try different UPI ID or date range</div>
      </div>`;
    return;
  }

  list.innerHTML = results.map((r, i) => {
    const badgeColor = (r.status === 'paid' || r.status === 'tracked') ? '#22c55e' : r.status === 'pending' ? '#f59e0b' : '#ef4444';
    const badgeText = (r.status === 'paid' || r.status === 'tracked') ? 'Confirmed' : r.status === 'pending' ? 'Pending' : r.status;

    // ✅ IST time
    const d = new Date(r.time);
    const date = d.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric', timeZone:'Asia/Kolkata'});
    const time = d.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', hour12:true, timeZone:'Asia/Kolkata'}).toUpperCase();

    return `
      <div class="result-card">
        <div class="result-row"><span class="row-label">SL NO.</span><span class="row-val">${i+1}</span></div>
        <div class="result-row"><span class="row-label">EVENT</span><span class="row-val">${r.event || 'install'}</span></div>
        <div class="result-row"><span class="row-label">STATUS</span><span class="badge" style="background:${badgeColor}">${badgeText}</span></div>
        <div class="result-row"><span class="row-label">DATE</span><span class="row-val">${date}</span></div>
        <div class="result-row"><span class="row-label">TIME</span><span class="row-val">${time}</span></div>
      </div>`;
  }).join('');
}

function resetForm() {
  document.getElementById('resultsWrap').style.display = 'none';
  document.getElementById('searchInput').value = '';
  document.getElementById('upiInput').value = '';
  allResults = [];
}
</script>
</body>
  </html>
